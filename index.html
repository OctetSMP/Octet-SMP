<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octet SMP</title>
    <link rel="icon" href="../../images/Logo.png">
    <style>
    .loader {
        display: flex;
    }

    .loader .dot {
        height: 20px;
        width: 20px;
        border-radius: 50%;
        border: 2px solid #e8e8e8;
        background: #16b0c1;
        animation: jump 0.8s ease-in-out infinite alternate;
    }

    @keyframes jump {
        100% {
            background: #661e92;
            transform: translateY(-3rem) scale(1.9);
        }
    }

    .loader .dot:nth-child(1) {
        animation-delay: 0.1s;
    }

    .loader .dot:nth-child(2) {
        animation-delay: 0.2s;
    }

    .loader .dot:nth-child(3) {
        animation-delay: 0.3s;
    }

    .loader .dot:nth-child(4) {
        animation-delay: 0.4s;
    }

    .loader .dot:nth-child(5) {
        animation-delay: 0.5s;
    }

    </style>
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;" class="loader">
        
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <script src="scripts/googlesheet.js"></script>
<script src="scripts/accountcheckhave.js"></script>
    <script>
        checkhave('html/Guest/home.html', 'html/Member/home.html');
    </script>
</body>
</html>
